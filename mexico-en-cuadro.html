<main class="page-shell"><section class="article-header"><p class="kicker">Fotogaleria</p><h1>Mexico en Cuadro</h1><div class="article-meta"><span>Por Patricio Velasco Diaz</span><span>Fuera de Cuadro</span></div></section><section class="section-pad"><div class="section-head"><div><p class="kicker">Mexico en seis escenas</p><h2>Mirar el pais</h2></div><p>Una seleccion visual sobre calle, transporte, deporte, pantallas, cultura y ciudad.</p></div><div class="gallery-grid"><div class="gallery-item"><figure><div class="media"><img src="assets/img/galeria-1.jpg.jpg" alt="Ciudad y movimiento" data-fallback="Escena 1"></div><figcaption><strong>Entre concreto y movimiento</strong><p>La vida urbana se construye entre prisa, ruido y rutina.</p></figcaption></figure></div><div class="gallery-item"><figure><div class="media"><img src="assets/img/galeria-2.jpg.jpg" alt="Pantallas en la mano" data-fallback="Escena 2"></div><figcaption><strong>Pantallas en la mano</strong><p>El celular se volvio espacio de informacion, trabajo y conversacion publica.</p></figcaption></figure></div><div class="gallery-item"><figure><div class="media"><img src="assets/img/galeria-3.jpg.jpg" alt="Cancha abierta" data-fallback="Escena 3"></div><figcaption><strong>Cancha abierta</strong><p>El deporte aparece donde hay espacio, comunidad y ganas de competir.</p></figcaption></figure></div><div class="gallery-item"><figure><div class="media"><img src="assets/img/galeria-4.jpg.jpg" alt="Cultura en la calle" data-fallback="Escena 4"></div><figcaption><strong>Cultura en la calle</strong><p>La identidad tambien vive fuera de museos y escenarios formales.</p></figcaption></figure></div><div class="gallery-item"><figure><div class="media"><img src="assets/img/galeria-5.jpg.jpg" alt="Juventud conectada" data-fallback="Escena 5"></div><figcaption><strong>Juventud conectada</strong><p>Las nuevas generaciones discuten, crean y se informan desde redes.</p></figcaption></figure></div><div class="gallery-item"><figure><div class="media"><img src="assets/img/galeria-6.jpg.jpg" alt="Mexico regional" data-fallback="Escena 6"></div><figcaption><strong>Mexico regional</strong><p>Cada zona del pais cuenta una parte distinta de la historia nacional.</p></figcaption></figure></div></div><a class="btn" href="index.html">Volver al inicio</a></section></main><script src="assets/js/main.js?v=2"></script></body></html>
